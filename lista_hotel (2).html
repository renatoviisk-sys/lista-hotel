<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista do Dia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#0f1117;--bg1:#181c25;--bg2:#1e2330;--bg3:#252b3a;
  --border:#2d3447;--border2:#3a4260;
  --txt:#e8eaf2;--txt2:#9aa3be;--txt3:#606880;
  --green:#4ade80;--green-bg:#0d2a1a;
  --red:#f87171;--red-bg:#2a0d0d;
  --blue:#60a5fa;--blue-dim:#1a2a3d;
  --amber:#fbbf24;--amber-bg:#2a1a05;
  --purple:#c084fc;--purple-bg:#1e0a2e;
  --radius:12px;--radius-sm:8px;
}
html,body{background:var(--bg0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;}
#app{max-width:560px;margin:0 auto;padding:0 0 3rem;}

/* Tab bar */
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem;position:sticky;top:0;background:var(--bg0);z-index:10;}
.tab{flex:1;padding:0.9rem 0;font-size:13px;font-weight:500;color:var(--txt3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s;}
.tab.active{color:var(--txt);border-bottom-color:var(--blue);}

.tab-content{display:none;padding:0 1rem;}
.tab-content.active{display:block;}

.page-title{font-size:13px;font-weight:500;color:var(--txt3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1rem;}

/* Drop zone */
#drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;cursor:pointer;background:var(--bg1);transition:background 0.15s;margin-bottom:1.25rem;}
#drop-zone:hover,#drop-zone.drag{background:var(--bg2);}
#drop-zone.loaded{border-style:solid;border-color:var(--border);}
#file-input{display:none;}
.upload-icon{font-size:26px;margin-bottom:0.5rem;}
.upload-label{font-size:15px;color:var(--txt);font-weight:500;}
.upload-sub{font-size:13px;color:var(--txt2);margin-top:4px;}

/* Metrics */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem;}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 0.5rem;text-align:center;}
.metric-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.metric-value{font-size:22px;font-weight:500;color:var(--txt);}

/* Enxoval panel */
.enxoval-section{background:var(--bg1);border:0.5px solid var(--border2);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;}
.enxoval-title{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:0.75rem;}
.enxoval-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.enxoval-item{background:var(--bg2);border-radius:var(--radius-sm);padding:0.6rem 0.5rem;text-align:center;}
.enxoval-val{font-size:20px;font-weight:500;color:var(--amber);}
.enxoval-lbl{font-size:10px;color:var(--txt3);margin-top:3px;line-height:1.3;}

/* Search + filters */
#search-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);font-size:14px;background:var(--bg2);color:var(--txt);outline:none;margin-bottom:0.75rem;-webkit-appearance:none;}
#search-input::placeholder{color:var(--txt3);}
#search-input:focus{border-color:var(--blue);}
.filter-row{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{font-size:12px;padding:6px 14px;border-radius:99px;white-space:nowrap;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt2);cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.filter-btn.active{background:var(--bg3);color:var(--txt);font-weight:500;}

/* Hotel + apt cards */
.hotel-section{margin-bottom:1.5rem;}
.hotel-header{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);padding-bottom:8px;margin-bottom:6px;border-bottom:0.5px solid var(--border);}
.apt-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;}
.apt-card.has-movement{border-color:var(--border2);}
.apt-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:54px;padding-top:2px;}
.apt-number{font-size:16px;font-weight:500;color:var(--txt);line-height:1;}
.bed-config{font-size:9px;color:var(--txt3);text-align:center;line-height:1.4;max-width:54px;}
.apt-right{flex:1;min-width:0;}
.badges-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.type-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;}
.badge-both{background:var(--blue-dim);color:var(--blue);}
.badge-in{background:var(--green-bg);color:var(--green);}
.badge-out{background:var(--red-bg);color:var(--red);}
.badge-empty{background:var(--bg3);color:var(--txt3);}
.guest-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:0.5px solid var(--border);}
.guest-row:first-of-type{border-top:none;}
.dir-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-in{background:var(--green);}
.dot-out{background:var(--red);}
.guest-name{font-size:13px;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.guest-meta{font-size:11px;color:var(--txt3);white-space:nowrap;}
.no-movement{font-size:12px;color:var(--txt3);font-style:italic;}
.enxoval-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border);}
.chip{font-size:10px;padding:2px 7px;border-radius:99px;background:var(--amber-bg);color:var(--amber);white-space:nowrap;}

#results{display:none;}
.empty-state{text-align:center;padding:2rem;color:var(--txt3);font-size:14px;}

/* ── LAVANDERIA TAB ── */
.lav-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.lav-month{font-size:15px;font-weight:500;color:var(--txt);}
.lav-sub{font-size:12px;color:var(--txt3);margin-top:2px;}
.btn-reset{font-size:12px;padding:6px 14px;border-radius:99px;border:0.5px solid var(--red-bg);background:var(--red-bg);color:var(--red);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-reset:active{opacity:0.7;}

.lav-total-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.5rem;}
.lav-total-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;text-align:center;}
.lav-total-val{font-size:24px;font-weight:500;color:var(--purple);}
.lav-total-lbl{font-size:11px;color:var(--txt3);margin-top:3px;}

.lav-apt-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:6px;display:flex;align-items:center;gap:12px;}
.lav-apt-left{min-width:54px;text-align:center;}
.lav-apt-num{font-size:15px;font-weight:500;color:var(--txt);}
.lav-apt-hotel{font-size:9px;color:var(--txt3);}
.lav-apt-right{flex:1;}
.lav-apt-count{font-size:22px;font-weight:500;color:var(--purple);text-align:right;}
.lav-apt-label{font-size:11px;color:var(--txt3);text-align:right;}
.lav-history{margin-top:4px;}
.lav-day-chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg3);color:var(--txt3);margin:2px 2px 0 0;}
.lav-empty{text-align:center;padding:3rem 1rem;color:var(--txt3);font-size:14px;}
.lav-empty-icon{font-size:32px;margin-bottom:0.75rem;}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--txt);font-size:13px;padding:10px 20px;border-radius:99px;border:0.5px solid var(--border2);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}

/* Confirm dialog */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.dialog{background:var(--bg1);border:0.5px solid var(--border2);border-radius:var(--radius);padding:1.5rem;max-width:300px;width:90%;text-align:center;}
.dialog-title{font-size:16px;font-weight:500;color:var(--txt);margin-bottom:0.5rem;}
.dialog-sub{font-size:13px;color:var(--txt2);margin-bottom:1.25rem;line-height:1.5;}
.dialog-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt2);font-size:14px;cursor:pointer;}
.btn-confirm{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--red-bg);color:var(--red);font-size:14px;font-weight:500;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('lista',this)">Lista do Dia</div>
    <div class="tab" onclick="switchTab('lavanderia',this)">Lavanderia</div>
  </div>

  <!-- TAB: LISTA -->
  <div id="tab-lista" class="tab-content active">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-label" id="drop-label">Carregar PDF</div>
      <div class="upload-sub" id="drop-sub">Clique ou arraste a lista de entradas e saídas</div>
      <input type="file" id="file-input" accept=".pdf">
    </div>
    <div id="results"></div>
  </div>

  <!-- TAB: LAVANDERIA -->
  <div id="tab-lavanderia" class="tab-content">
    <div id="lav-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-title">Zerar mês?</div>
    <div class="dialog-sub">Todo o histórico de trocas do mês será apagado. Essa ação não pode ser desfeita.</div>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeDialog()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmReset()">Zerar</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── ROOMS ────────────────────────────────────────────────────────────────────
const ROOMS={
  "Comf":{order:1,apts:{"109":"2s","202":"cs","207":"cs","811":"c","1014":"cs","1102":"c","1111":"c","1301":"cs"}},
  "Lets":{order:2,apts:{"506":"c","913":"2s","1301":"c"}},
  "Kubit":{order:3,apts:{"113":"c","117":"c"}},
  "Bona":{order:4,apts:{"618":"c","702":"c"}},
  "Saint":{order:5,apts:{"411":"cs","815":"c","1215":"c"}},
  "Ramada":{order:6,apts:{"1214":"2s"}},
  "Tryp":{order:7,apts:{"06":"c","105":"c","207":"c"}},
  "Comft":{order:8,apts:{"106":"c","109":"cs","111":"2s","114":"c","206":"c","310":"c","311":"2s","316":"c","407":"2s","607":"2s","614":"c","705":"c","710":"c","803":"c","809":"c","810":"cs","1007":"cs"}},
  "Go Inn":{order:9,apts:{"101":"c","114":"c","119":"c","305":"cs","313":"2s","411":"c","413":"cs","516":"c","517":"c","603":"c","605":"cs","609":"cs","611":"c","617":"c","708":"c"}}
};
const CFG_LABEL={"c":"casal","2s":"2 solteiro","cs":"casal + solteiro"};

// ── LINEN CALC ───────────────────────────────────────────────────────────────
function calcLinen(config,guests){
  let g=guests;
  if(g===null){if(config==='c')g=2;else if(config==='2s')g=2;else if(config==='cs')g=3;}
  g=Math.max(1,g);
  let lc=0,ls=0,f=0,t=0,tr=1,tp=1;
  if(config==='c'){lc=2;f=2;}
  else if(config==='2s'){const beds=g>=2?2:1;ls=beds*2;f=beds*1;}
  else if(config==='cs'){lc=2;f=2;if(g>=2){ls=2;f+=1;}}
  t=g;return{lc,ls,f,t,tr,tp};
}
function linenChips(lin){
  const p=[];
  if(lin.lc)p.push(lin.lc+'× lençol casal');
  if(lin.ls)p.push(lin.ls+'× lençol solteiro');
  if(lin.f)p.push(lin.f+'× fronha');
  if(lin.t)p.push(lin.t+'× toalha');
  p.push('1× t. rosto');p.push('1× tapete');
  return p;
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='lavanderia') renderLavanderia();
}

// ── LAVANDERIA STORAGE ────────────────────────────────────────────────────────
// Structure: { "YYYY-MM": { "Hotel||apt": { count: N, days: ["YYYY-MM-DD",...] } } }
function getLavData(){
  try{return JSON.parse(localStorage.getItem('lav_data')||'{}');}catch{return {};}
}
function saveLavData(data){localStorage.setItem('lav_data',JSON.stringify(data));}

function currentMonthKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Register checkouts from a parsed day. Skips if that date already registered.
function registerCheckouts(depMap, dateKey){
  // dateKey format: "YYYY-MM-DD" extracted from PDF, fallback to today
  const dayKey = dateKey || todayKey();
  const month = dayKey.substring(0,7); // "YYYY-MM"
  const data=getLavData();
  if(!data[month])data[month]={};

  let newCount=0;
  Object.keys(depMap).forEach(k=>{
    if(!depMap[k]||depMap[k].length===0)return;
    if(!data[month][k])data[month][k]={count:0,days:[]};
    if(data[month][k].days.includes(dayKey))return; // already registered this date
    data[month][k].count+=1;
    data[month][k].days.push(dayKey);
    newCount++;
  });
  saveLavData(data);
  return newCount;
}

function renderLavanderia(){
  const month=currentMonthKey();
  const data=getLavData();
  const monthData=data[month]||{};

  // Month label
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [y,m]=month.split('-');
  const monthLabel=monthNames[parseInt(m)-1]+' '+y;

  // Build list of apts that have records
  const entries=Object.keys(monthData)
    .filter(k=>monthData[k].count>0)
    .map(k=>{
      const[hotel,apt]=k.split('||');
      return{key:k,hotel,apt,count:monthData[k].count,days:monthData[k].days};
    })
    .sort((a,b)=>{
      const oa=ROOMS[a.hotel]?.order??99, ob=ROOMS[b.hotel]?.order??99;
      if(oa!==ob)return oa-ob;
      return parseInt(a.apt)-parseInt(b.apt);
    });

  const totalTrocas=entries.reduce((s,e)=>s+e.count,0);
  const totalAptos=entries.length;

  let html=`
  <div class="lav-header">
    <div>
      <div class="lav-month">${monthLabel}</div>
      <div class="lav-sub">Histórico de trocas de enxoval</div>
    </div>
    <button class="btn-reset" onclick="openDialog()">Zerar mês</button>
  </div>

  <div class="lav-total-grid">
    <div class="lav-total-card"><div class="lav-total-val">${totalTrocas}</div><div class="lav-total-lbl">Trocas no mês</div></div>
    <div class="lav-total-card"><div class="lav-total-val">${totalAptos}</div><div class="lav-total-lbl">Aptos atendidos</div></div>
  </div>`;

  if(entries.length===0){
    html+=`<div class="lav-empty"><div class="lav-empty-icon">🧺</div>Nenhuma troca registrada este mês.<br>Carregue um PDF na aba Lista do Dia.</div>`;
  } else {
    // Group by hotel
    const hotels=[...new Set(entries.map(e=>e.hotel))];
    hotels.forEach(hotel=>{
      const hotelEntries=entries.filter(e=>e.hotel===hotel);
      html+=`<div class="hotel-section"><div class="hotel-header">${hotel}</div>`;
      hotelEntries.forEach(e=>{
        const dayChips=e.days.map(d=>{
          const[,mm,dd]=d.split('-');
          return`<span class="lav-day-chip">${dd}/${mm}</span>`;
        }).join('');
        html+=`<div class="lav-apt-card">
          <div class="lav-apt-left">
            <div class="lav-apt-num">${e.apt}</div>
            <div class="lav-apt-hotel">${CFG_LABEL[ROOMS[e.hotel]?.apts[e.apt]]||''}</div>
          </div>
          <div class="lav-apt-right">
            <div style="display:flex;align-items:baseline;justify-content:space-between;">
              <div class="lav-history">${dayChips}</div>
              <div>
                <div class="lav-apt-count">${e.count}×</div>
                <div class="lav-apt-label">trocas</div>
              </div>
            </div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  }

  document.getElementById('lav-content').innerHTML=html;
}

// ── DIALOG ────────────────────────────────────────────────────────────────────
function openDialog(){document.getElementById('overlay').classList.add('show');}
function closeDialog(){document.getElementById('overlay').classList.remove('show');}
function confirmReset(){
  const data=getLavData();
  const month=currentMonthKey();
  delete data[month];
  saveLavData(data);
  closeDialog();
  renderLavanderia();
  showToast('Mês zerado com sucesso');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── FILE HANDLING ─────────────────────────────────────────────────────────────
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
document.getElementById('file-input').addEventListener('change',e=>handleFile(e.target.files[0]));

async function handleFile(file){
  if(!file)return;
  document.getElementById('drop-label').textContent='Carregando...';
  document.getElementById('drop-sub').textContent=file.name;
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let items=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      tc.items.forEach(it=>{const s=it.str.trim();if(s)items.push({s,y:Math.round(it.transform[5]),x:Math.round(it.transform[4]),p});});
    }
    const map={};
    items.forEach(it=>{const k=it.p+'_'+it.y;if(!map[k])map[k]=[];map[k].push(it);});
    const lines=Object.keys(map)
      .sort((a,b)=>{const[pa,ya]=a.split('_').map(Number);const[pb,yb]=b.split('_').map(Number);return pa!==pb?pa-pb:yb-ya;})
      .map(k=>map[k].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ').replace(/\s+/g,' ').trim())
      .filter(l=>l.length>0);
    parseAndRender(lines,file.name);
  }catch(err){
    document.getElementById('drop-label').textContent='Erro ao ler PDF';
    document.getElementById('drop-sub').textContent=err.message;
  }
}

// ── HOTEL DETECTOR ────────────────────────────────────────────────────────────
const HOTEL_TESTS=[
  {r:/go\s*inn?/i,h:'Go Inn'},{r:/comf\s*t\b|comft\b/i,h:'Comft'},{r:/\bcomf\b/i,h:'Comf'},
  {r:/\blets\b/i,h:'Lets'},{r:/\bkubit\b/i,h:'Kubit'},{r:/\bbona\b/i,h:'Bona'},
  {r:/\bsaint\b/i,h:'Saint'},{r:/\bramada\b/i,h:'Ramada'},{r:/\btryp\b/i,h:'Tryp'},
];
function aptKey(raw){return raw.replace(/^0+/,'').replace(/-\d+$/,'');}
function findMatch(line){
  for(const t of HOTEL_TESTS){
    if(!t.r.test(line))continue;
    const hotelApts=ROOMS[t.h]?.apts;if(!hotelApts)continue;
    const nums=(line.match(/\b\d{2,4}(?:-\d)?\b/g)||[]);
    for(const num of nums){const key=aptKey(num);for(const apt of Object.keys(hotelApts)){if(aptKey(apt)===key)return{hotel:t.h,apt};}}
  }
  return null;
}
function extractName(line){
  const dateM=line.match(/\d{1,2}\s+[a-záéíóúàâêôãõç]+\s+\d{4}/i);
  if(dateM){let s=line.substring(0,line.indexOf(dateM[0]));s=s.replace(/go\s*inn?|comf\s*t|comft|comf|lets|kubit|bona|saint|ramada|tryp/gi,'');s=s.replace(/\b\d{2,4}(?:-\d+)?\b/g,'').replace(/\s+/g,' ').trim();if(s.length>2)return s;}
  return '';
}
function extractGuests(line){const m=line.match(/\b([1-9])\b/);return m?parseInt(m[0]):1;}

// ── PARSE ─────────────────────────────────────────────────────────────────────
let _arr={},_dep={},_filt='all',_srch='';

function parseAndRender(lines,filename){
  _arr={};_dep={};let sec=null;
  lines.forEach(line=>{
    if(/chegadas/i.test(line)){sec='in';return;}
    if(/sa[íi]das/i.test(line)){sec='out';return;}
    if(!sec||/h[oó]spede.*data|acomoda[çc]|recep[çc]/i.test(line))return;
    const m=findMatch(line);if(!m)return;
    const name=extractName(line),guests=extractGuests(line),k=m.hotel+'||'+m.apt,entry={name,guests};
    if(sec==='in'){if(!_arr[k])_arr[k]=[];_arr[k].push(entry);}
    else{if(!_dep[k])_dep[k]=[];_dep[k].push(entry);}
  });

  // Extract date from PDF (format "16 mar 2026")
  const monthPT={'jan':'01','fev':'02','mar':'03','abr':'04','mai':'05','jun':'06','jul':'07','ago':'08','set':'09','out':'10','nov':'11','dez':'12'};
  let pdfDateKey=todayKey();
  for(const line of lines){
    const dm=line.match(/(\d{1,2})\s+([a-z]{3})\s+(\d{4})/i);
    if(dm){
      const mm=monthPT[dm[2].toLowerCase()]||'01';
      pdfDateKey=dm[3]+'-'+mm+'-'+String(dm[1]).padStart(2,'0');
      break;
    }
  }

  // Register in lavanderia (only checkouts)
  const newCount=registerCheckouts(_dep, pdfDateKey);
  if(newCount>0)showToast(newCount+' troca'+(newCount>1?'s':'')+' registrada'+(newCount>1?'s':'')+' na lavanderia');
  else showToast('Dia já registrado na lavanderia');

  dz.classList.add('loaded');
  document.getElementById('drop-label').textContent=filename;
  document.getElementById('drop-sub').textContent='Clique para trocar o arquivo';
  renderUI();
}

// ── LINEN TOTALS ──────────────────────────────────────────────────────────────
function calcTotals(){
  const tot={lc:0,ls:0,f:0,t:0,tr:0,tp:0};
  Object.keys(ROOMS).forEach(hotel=>{
    Object.keys(ROOMS[hotel].apts).forEach(apt=>{
      const k=hotel+'||'+apt,config=ROOMS[hotel].apts[apt];
      const hasIn=(_arr[k]?.length>0),hasOut=(_dep[k]?.length>0);
      if(!hasOut)return;
      const guests=hasIn?(_arr[k][0]?.guests??null):null;
      const lin=calcLinen(config,guests);
      tot.lc+=lin.lc;tot.ls+=lin.ls;tot.f+=lin.f;tot.t+=lin.t;tot.tr+=lin.tr;tot.tp+=lin.tp;
    });
  });
  return tot;
}

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
function renderUI(){
  let tIn=0,tOut=0,tBoth=0;
  Object.keys(ROOMS).forEach(h=>Object.keys(ROOMS[h].apts).forEach(a=>{
    const k=h+'||'+a,i=_arr[k]?.length>0,o=_dep[k]?.length>0;
    if(i)tIn++;if(o)tOut++;if(i&&o)tBoth++;
  }));
  const total=Object.values(ROOMS).reduce((s,h)=>s+Object.keys(h.apts).length,0);
  const lin=calcTotals();

  document.getElementById('results').innerHTML=`
  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Chegadas</div><div class="metric-value">${tIn}</div></div>
    <div class="metric"><div class="metric-label">Saídas</div><div class="metric-value">${tOut}</div></div>
    <div class="metric"><div class="metric-label">Troca</div><div class="metric-value">${tBoth}</div></div>
    <div class="metric"><div class="metric-label">Aptos</div><div class="metric-value">${total}</div></div>
  </div>
  <div class="enxoval-section">
    <div class="enxoval-title">🛏 Enxoval do dia</div>
    <div class="enxoval-grid">
      <div class="enxoval-item"><div class="enxoval-val">${lin.lc}</div><div class="enxoval-lbl">Lençol casal</div></div>
      <div class="enxoval-item"><div class="enxoval-val">${lin.ls}</div><div class="enxoval-lbl">Lençol solteiro</div></div>
      <div class="enxoval-item"><div class="enxoval-val">${lin.f}</div><div class="enxoval-lbl">Fronha</div></div>
      <div class="enxoval-item"><div class="enxoval-val">${lin.t}</div><div class="enxoval-lbl">Toalha banho</div></div>
      <div class="enxoval-item"><div class="enxoval-val">${lin.tr}</div><div class="enxoval-lbl">Toalha rosto</div></div>
      <div class="enxoval-item"><div class="enxoval-val">${lin.tp}</div><div class="enxoval-lbl">Tapete</div></div>
    </div>
  </div>
  <input type="text" id="search-input" placeholder="Buscar apto ou hóspede..." oninput="onSearch(this.value)">
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('both',this)">Troca</button>
    <button class="filter-btn" onclick="setFilter('in',this)">Só chegada</button>
    <button class="filter-btn" onclick="setFilter('out',this)">Só saída</button>
    <button class="filter-btn" onclick="setFilter('empty',this)">Sem mov.</button>
  </div>
  <div id="cards-root"></div>`;
  document.getElementById('results').style.display='block';
  renderCards();
}

function onSearch(v){_srch=v.toLowerCase();renderCards();}
function setFilter(f,btn){_filt=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards();}

function renderCards(){
  const root=document.getElementById('cards-root');if(!root)return;
  let html='',any=false;
  Object.keys(ROOMS).sort((a,b)=>ROOMS[a].order-ROOMS[b].order).forEach(hotel=>{
    let sec='';
    Object.keys(ROOMS[hotel].apts).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(apt=>{
      const k=hotel+'||'+apt;
      const iL=_arr[k]||[],oL=_dep[k]||[];
      const hi=iL.length>0,ho=oL.length>0,emp=!hi&&!ho,both=hi&&ho;
      if(_filt==='both'&&!both)return;
      if(_filt==='in'&&(!hi||both))return;
      if(_filt==='out'&&(!ho||both))return;
      if(_filt==='empty'&&!emp)return;
      if(_srch){const s=(hotel+' '+apt).toLowerCase(),n=[...iL,...oL].map(x=>x.name.toLowerCase()).join(' ');if(!s.includes(_srch)&&!n.includes(_srch))return;}
      any=true;
      const config=ROOMS[hotel].apts[apt],cfgLabel=CFG_LABEL[config]||config;
      const badge=emp?`<span class="type-badge badge-empty">Sem movimento</span>`:both?`<span class="type-badge badge-both">⇄ Troca</span>`:hi?`<span class="type-badge badge-in">↓ Chegada</span>`:`<span class="type-badge badge-out">↑ Saída</span>`;
      let rows='';
      oL.forEach(g=>{rows+=`<div class="guest-row"><div class="dir-dot dot-out"></div><span class="guest-name">${g.name||'–'}</span><span class="guest-meta">${g.guests} px · 12:00</span></div>`;});
      iL.forEach(g=>{rows+=`<div class="guest-row"><div class="dir-dot dot-in"></div><span class="guest-name">${g.name||'–'}</span><span class="guest-meta">${g.guests} px · 15:00</span></div>`;});
      if(emp)rows=`<div class="no-movement">sem movimentação hoje</div>`;
      let chipsHtml='';
      if(ho){const guests=hi?(iL[0]?.guests??null):null;const lin=calcLinen(config,guests);const chips=linenChips(lin);chipsHtml=`<div class="enxoval-chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`;}
      sec+=`<div class="apt-card ${emp?'':'has-movement'}"><div class="apt-left"><span class="apt-number">${apt}</span><span class="bed-config">${cfgLabel}</span></div><div class="apt-right"><div class="badges-row">${badge}</div>${rows}${chipsHtml}</div></div>`;
    });
    if(sec)html+=`<div class="hotel-section"><div class="hotel-header">${hotel}</div>${sec}</div>`;
  });
  root.innerHTML=any?html:`<div class="empty-state">Nenhum resultado encontrado.</div>`;
}
</script>
</body>
</html>
