<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lista do Dia</title>
<!-- ── TIPOGRAFIA: Inter (400/500/600/700) ── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- ── BANCO COMPARTILHADO: Supabase ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — "Obsidian"
   Inspiração: Linear, Vercel, Raycast dark dashboards
   ═══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── Fundos em camadas — preto puro neutro ── */
  --bg-base:  #000000;
  --bg-0:     #0a0a0a;
  --bg-1:     #111111;
  --bg-2:     #171717;
  --bg-3:     #1f1f1f;
  --bg-hover: #2a2a2a;
  /* ── Bordas ultra-finas — branco puro ── */
  --b0: rgba(255,255,255,0.05);
  --b1: rgba(255,255,255,0.08);
  --b2: rgba(255,255,255,0.12);
  --b3: rgba(255,255,255,0.20);
  /* ── Texto — neutros sem tom azul ── */
  --t1: #f5f5f5;   /* primário */
  --t2: #a0a0a0;   /* secundário */
  --t3: #5a5a5a;   /* terciário / muted */
  /* ── Indigo — ação primária (tabs, filtros ativos) ── */
  --indigo:     #818cf8;
  --indigo-dim: rgba(99,102,241,0.13);
  --indigo-bdr: rgba(99,102,241,0.28);
  /* ── Teal-green — check-in ── */
  --green:     #2dd4a0;
  --green-dim: rgba(45,212,160,0.10);
  --green-bdr: rgba(45,212,160,0.22);
  /* ── Coral — check-out ── */
  --red:     #f87171;
  --red-dim: rgba(248,113,113,0.10);
  --red-bdr: rgba(248,113,113,0.22);
  /* ── Amber — enxoval ── */
  --amber:     #fbbf24;
  --amber-dim: rgba(251,191,36,0.10);
  --amber-bdr: rgba(251,191,36,0.22);
  /* ── Violet — lavanderia ── */
  --violet:     #a78bfa;
  --violet-dim: rgba(167,139,250,0.10);
  --violet-bdr: rgba(167,139,250,0.22);
  /* ── Sage — limpeza ── */
  --sage:     #34d399;
  --sage-dim: rgba(52,211,153,0.10);
  --sage-bdr: rgba(52,211,153,0.20);
  /* ── Raios ── */
  --r-xs:   5px;
  --r-sm:   10px;
  --r-md:   14px;
  --r-lg:   18px;
  --r-xl:   24px;
  --r-pill: 9999px;
  /* ── Sombras ── */
  --sh-sm: 0 1px 3px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);
  --sh-md: 0 4px 18px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.3);
  --sh-lg: 0 16px 50px rgba(0,0,0,0.65), 0 4px 14px rgba(0,0,0,0.4);
  /* ── Fonte ── */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
/* ── Reset & base ─────────────────────────────────────────────── */
html,body{
  background: var(--bg-base);
  color: var(--t1);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
/* Scrollbars finos (webkit) */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
#app{max-width:580px;margin:0 auto;padding:0 0 5rem;}
/* ══════════════════════════════════════════════════════════════
   TAB BAR — frosted glass, sticky
   ══════════════════════════════════════════════════════════════ */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--b1);
  margin-bottom:1.75rem;
  position:sticky;
  top:0;
  /* Glass morfismo no header */
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  z-index:20;
  padding:0 1.25rem;
}
.tab{
  flex:1;
  padding:1rem 0.5rem;
  font-size:13px;
  font-weight:500;
  color:var(--t3);
  text-align:center;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .2s, border-color .2s;
  letter-spacing:0.01em;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--t2);}
.tab.active{color:var(--t1);border-bottom-color:var(--indigo);}
.tab-content{display:none;padding:0 1.25rem;}
.tab-content.active{display:block;}
/* ══════════════════════════════════════════════════════════════
   DROP ZONE — convidativa, com brilho de fundo
   ══════════════════════════════════════════════════════════════ */
#drop-zone{
  position:relative;
  overflow:hidden;
  border:1.5px dashed var(--b2);
  border-radius:var(--r-lg);
  padding:2.75rem 2rem;
  text-align:center;
  cursor:pointer;
  background:var(--bg-1);
  transition:background .2s, border-color .2s, transform .15s;
  margin-bottom:1.75rem;
}
/* Brilho indigo sutil no topo — dá sensação de "ativo" */
#drop-zone::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,0.08) 0%,transparent 70%);
  pointer-events:none;
}
#drop-zone:hover,#drop-zone.drag{
  background:var(--bg-2);
  border-color:var(--indigo-bdr);
}
#drop-zone.drag{transform:scale(1.015);}
#drop-zone.loaded{
  border-style:solid;
  border-color:var(--b1);
}
#drop-zone.loaded::before{opacity:0;}
#file-input{display:none;}
.upload-icon{
  font-size:32px;
  margin-bottom:0.875rem;
  display:block;
  transition:transform .2s;
}
#drop-zone:hover .upload-icon{transform:translateY(-2px);}
.upload-label{
  font-size:15px;
  font-weight:600;
  color:var(--t1);
  letter-spacing:-0.01em;
}
.upload-sub{
  font-size:13px;
  color:var(--t3);
  margin-top:6px;
  line-height:1.6;
}
/* ══════════════════════════════════════════════════════════════
   SUMMARY GRID — 4 métricas
   ══════════════════════════════════════════════════════════════ */
.date-banner{
  display:flex;
  align-items:center;
  gap:0.6rem;
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:0.75rem 1rem;
  margin-bottom:1rem;
  font-size:13px;
  font-weight:500;
  color:var(--t1);
}
.date-banner-icon{font-size:15px;}
.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:1.75rem;
}
.metric{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1.1rem 0.75rem;
  text-align:center;
  box-shadow:var(--sh-sm);
  transition:border-color .2s, background .2s;
}
.metric:hover{background:var(--bg-2);border-color:var(--b2);}
.metric-label{
  font-size:10px;
  font-weight:600;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:7px;
}
.metric-value{
  font-size:26px;
  font-weight:700;
  color:var(--t1);
  letter-spacing:-0.03em;
  line-height:1;
}
/* ══════════════════════════════════════════════════════════════
   ENXOVAL PANEL
   ══════════════════════════════════════════════════════════════ */
.enxoval-section{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-lg);
  padding:1.25rem 1.5rem;
  margin-bottom:1.75rem;
  box-shadow:var(--sh-sm);
}
.enxoval-title{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t3);
  margin-bottom:1rem;
}
/* 4 colunas — 7 itens ficam em 4+3, último row com 3 itens centralizados */
.enxoval-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
/* Centraliza o último item quando ele fica sozinho (posição 4n+1 do fim) */
.enxoval-item:last-child:nth-child(4n+1){grid-column:2;}
.enxoval-item:last-child:nth-child(4n+2){grid-column:2 / span 2;max-width:unset;}
.enxoval-item{
  background:var(--bg-2);
  border:1px solid var(--b0);
  border-radius:var(--r-sm);
  padding:0.75rem 0.5rem;
  text-align:center;
  transition:border-color .2s, background .2s;
}
.enxoval-item:hover{
  background:var(--bg-3);
  border-color:var(--amber-bdr);
}
.enxoval-val{
  font-size:22px;
  font-weight:700;
  color:var(--amber);
  letter-spacing:-0.02em;
  line-height:1;
}
.enxoval-lbl{
  font-size:10px;
  font-weight:500;
  color:var(--t3);
  margin-top:5px;
  line-height:1.4;
}
/* ══════════════════════════════════════════════════════════════
   DETALHAMENTO
   ══════════════════════════════════════════════════════════════ */
.detalhamento-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-family:var(--font);
  font-weight:500;
  padding:8px 16px;
  border-radius:var(--r-pill);
  border:1px solid var(--b1);
  background:var(--bg-1);
  color:var(--t2);
  cursor:pointer;
  margin-bottom:1rem;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.detalhamento-btn:hover{
  background:var(--bg-2);
  color:var(--t1);
  border-color:var(--b2);
}
.detalhamento-btn.active{
  background:var(--indigo-dim);
  color:var(--indigo);
  border-color:var(--indigo-bdr);
}
.detalhamento-section{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1rem 1.25rem;
  margin-bottom:1.75rem;
  max-height:420px;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  box-shadow:var(--sh-sm);
}
.detalhamento-title{
  font-size:10px;
  font-weight:700;
  color:var(--t3);
  margin-bottom:0.875rem;
  text-transform:uppercase;
  letter-spacing:0.1em;
}
.detalhamento-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 0;
  border-top:1px solid var(--b0);
  font-size:12px;
}
.detalhamento-item:first-of-type{border-top:none;}
.detalhamento-apt{
  min-width:62px;
  font-weight:600;
  color:var(--t1);
  font-size:12px;
}
.detalhamento-calc{
  flex:1;
  color:var(--t2);
  line-height:1.65;
}
.detalhamento-calc strong{color:var(--t1);}
/* ══════════════════════════════════════════════════════════════
   SEARCH
   ══════════════════════════════════════════════════════════════ */
#search-input{
  width:100%;
  padding:11px 16px;
  border-radius:var(--r-md);
  border:1px solid var(--b1);
  font-size:14px;
  font-family:var(--font);
  background:var(--bg-1);
  color:var(--t1);
  outline:none;
  margin-bottom:0.875rem;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
#search-input::placeholder{color:var(--t3);}
#search-input:focus{
  border-color:var(--indigo-bdr);
  box-shadow:0 0 0 3px var(--indigo-dim);
}
/* ══════════════════════════════════════════════════════════════
   FILTER ROW
   ══════════════════════════════════════════════════════════════ */
.filter-row{
  display:flex;
  gap:6px;
  margin-bottom:1.75rem;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:2px;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{
  font-size:12px;
  font-family:var(--font);
  font-weight:500;
  padding:7px 15px;
  border-radius:var(--r-pill);
  white-space:nowrap;
  border:1px solid var(--b1);
  background:var(--bg-1);
  color:var(--t2);
  cursor:pointer;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn:hover{
  background:var(--bg-2);
  color:var(--t1);
  border-color:var(--b2);
}
.filter-btn.active{
  background:var(--indigo-dim);
  color:var(--indigo);
  border-color:var(--indigo-bdr);
  font-weight:600;
}
/* ══════════════════════════════════════════════════════════════
   HOTEL SECTION & APT CARDS
   ══════════════════════════════════════════════════════════════ */
.hotel-section{margin-bottom:2rem;}
.hotel-header{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t3);
  padding:0 2px 10px;
  margin-bottom:8px;
  border-bottom:1px solid var(--b0);
}
.apt-card{
  background:var(--bg-1);
  border:1px solid var(--b0);
  border-radius:var(--r-md);
  padding:1rem 1.25rem;
  margin-bottom:8px;
  display:flex;
  align-items:stretch;
  gap:0;
  transition:border-color .2s, box-shadow .2s;
  box-shadow:var(--sh-sm);
  overflow:hidden;
}
.apt-card:hover{border-color:var(--b2);}
.apt-card.has-movement{border-color:var(--b1);}
.apt-card.has-movement:hover{
  border-color:var(--b2);
  box-shadow:var(--sh-md);
}
/* Número do apto — visual de "placa" */
.apt-left{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  min-width:56px;
  padding:0 0.875rem 0 0;
  margin-right:0.875rem;
  border-right:1px solid var(--b0);
}
.apt-number{
  font-size:18px;
  font-weight:700;
  color:var(--t1);
  line-height:1;
  letter-spacing:-0.01em;
}
.bed-config{
  font-size:9px;
  font-weight:600;
  color:var(--t3);
  text-align:center;
  line-height:1.4;
  max-width:56px;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.apt-right{flex:1;min-width:0;}
.badges-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}
/* ── Badges ──────────────────────────────────────── */
.type-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  font-weight:600;
  padding:4px 11px;
  border-radius:var(--r-pill);
  letter-spacing:0.01em;
  border:1px solid transparent;
}
.badge-both{background:var(--indigo-dim);color:var(--indigo);border-color:var(--indigo-bdr);}
.badge-in{background:var(--green-dim);color:var(--green);border-color:var(--green-bdr);}
.badge-out{background:var(--red-dim);color:var(--red);border-color:var(--red-bdr);}
.badge-empty{background:rgba(255,255,255,0.03);color:var(--t3);border-color:var(--b0);}
/* ── Guest rows ──────────────────────────────────── */
.guest-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-top:1px solid var(--b0);
}
.guest-row:first-of-type{border-top:none;}
.dir-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}
/* Glow sutil nos dots — micro-detalhe premium */
.dot-in{background:var(--green);box-shadow:0 0 7px rgba(45,212,160,0.55);}
.dot-out{background:var(--red);box-shadow:0 0 7px rgba(248,113,113,0.55);}
.guest-name{
  font-size:13px;
  font-weight:500;
  color:var(--t1);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.guest-meta{
  font-size:11px;
  font-weight:500;
  color:var(--t3);
  white-space:nowrap;
}
.no-movement{font-size:12px;color:var(--t3);font-style:italic;}
/* ── Linen chips ─────────────────────────────────── */
.enxoval-chips{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:9px;
  padding-top:9px;
  border-top:1px solid var(--b0);
}
.chip{
  font-size:10px;
  font-weight:600;
  padding:3px 9px;
  border-radius:var(--r-pill);
  background:var(--amber-dim);
  color:var(--amber);
  border:1px solid var(--amber-bdr);
  white-space:nowrap;
  letter-spacing:0.01em;
}
/* ── Tirar/incluir do enxoval (extensão de reserva) ── */
.enx-excluded{
  margin-top:9px;padding-top:9px;
  border-top:1px solid var(--b0);
  font-size:11px;font-weight:600;color:var(--violet);
}
.enx-toggle{
  display:inline-block;
  margin-top:9px;
  font-size:11px;font-family:var(--font);font-weight:600;
  padding:6px 13px;border-radius:var(--r-pill);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .15s;
}
.enx-toggle.in{background:transparent;color:var(--t3);border:1px solid var(--b1);}
.enx-toggle.in:hover{color:var(--red);border-color:var(--red-bdr);background:var(--red-dim);}
.enx-toggle.out{background:var(--green-dim);color:var(--green);border:1px solid var(--green-bdr);}
.enx-toggle.out:hover{background:rgba(45,212,160,0.17);}
.apt-card.apt-foraenx{opacity:.72;}
.apt-card.apt-foraenx:hover{opacity:1;}
#results{display:none;}
.empty-state{
  text-align:center;
  padding:4rem 2rem;
  color:var(--t3);
  font-size:14px;
  line-height:1.75;
}
/* ══════════════════════════════════════════════════════════════
   LAVANDERIA TAB
   ══════════════════════════════════════════════════════════════ */
.lav-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:1.75rem;
}
.lav-nav{display:flex;align-items:center;gap:10px;}
.lav-nav-btn{
  width:32px;height:32px;flex-shrink:0;
  border-radius:var(--r-pill);
  border:1px solid var(--b1);
  background:var(--bg-1);
  color:var(--t1);
  font-size:18px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.lav-nav-btn:hover{background:var(--bg-2);border-color:var(--b2);}
.lav-nav-btn:active{opacity:.7;}
.lav-nav-btn:disabled{opacity:.25;cursor:default;}
.lav-month{
  font-size:17px;
  font-weight:700;
  color:var(--t1);
  letter-spacing:-0.02em;
}
.lav-sub{
  font-size:12px;
  color:var(--t3);
  margin-top:3px;
  font-weight:400;
}
.btn-reset{
  font-size:12px;
  font-family:var(--font);
  font-weight:600;
  padding:7px 16px;
  border-radius:var(--r-pill);
  border:1px solid var(--red-bdr);
  background:var(--red-dim);
  color:var(--red);
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-reset:hover{background:rgba(248,113,113,0.17);border-color:rgba(248,113,113,0.32);}
.btn-reset:active{opacity:.75;}
.lav-total-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:1.75rem;
}
/* Modifier para margem menor (limpeza section) */
.lav-total-grid--sm{margin-bottom:1rem !important;}
.lav-total-card{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1.1rem 1.25rem;
  text-align:center;
  box-shadow:var(--sh-sm);
}
.lav-total-val{
  font-size:28px;
  font-weight:700;
  color:var(--violet);
  letter-spacing:-0.03em;
  line-height:1;
}
.lav-total-lbl{
  font-size:11px;
  font-weight:500;
  color:var(--t3);

<script>

   👉 Cole abaixo os 2 valores do SEU projeto Supabase.
      Veja o passo a passo em GUIA-SUPABASE.md
   ════════════════════════════════════════════════════════════════ */
const SUPABASE_URL      = 'https://bmhnvnlbcgegsgplkuea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtaG52bmxiY2dlZ3NncGxrdWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODcyMDcsImV4cCI6MjA5NzM2MzIwN30.cyaCBafC3DtAJN5r8Fc-jEX44_3WM8on-2QfCrgmra0';

function configurado(){
  return /^https:\/\/.+\.supabase\.co/.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 30;
}
function setSync(state){
  const pill=document.getElementById('sync-pill');
  const txt=document.getElementById('sync-text');
  if(!pill)return;
  pill.classList.remove('online','offline');
  if(state==='online'){pill.classList.add('online');txt.textContent='Sincronizado';}
  else if(state==='offline'){pill.classList.add('offline');txt.textContent='Sem conexão';}
  else{txt.textContent='Conectando…';}
}
async function initApp(){
  setSync('connecting');
  if(!configurado()){
    setSync('offline');
    avisoConfig();
    return;
  }
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    await recarregarTudo();
    assinarTempoReal();
    _ready = true;
    setSync('online');
    aplicarListaAtual();
    rerenderCompartilhado();
  }catch(e){
    setSync('offline');
    avisoConfig('Não consegui conectar ao banco. Verifique a URL/chave e a internet. ('+(e&&e.message||e)+')');
  }
}
function avisoConfig(msg){
  const aviso = msg || 'Configure o Supabase para começar — abra o arquivo GUIA-SUPABASE.md e siga os passos. Enquanto isso, o app fica sem conexão com o banco.';
  ['lav-content','est-content'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML=`<div class="empty-state">⚙️ ${esc(aviso)}</div>`;
  });
}
async function recarregarTudo(){
  await Promise.all([carregarEstoque(), carregarDias(), carregarTrocas(), carregarLimpezas(), carregarListaAtual(), carregarOverrides()]);
}
async function carregarEstoque(){
  const {data,error}=await sb.from('estoque').select('*');
  if(error)throw error;
  cache.estoque={}; (data||[]).forEach(r=>cache.estoque[r.item]=r.quantidade);
}
async function carregarDias(){
  const {data,error}=await sb.from('dias_fechados').select('*');
  if(error)throw error;
  cache.dias={}; (data||[]).forEach(r=>cache.dias[r.dia]=r);
}
async function carregarTrocas(){
  const {data,error}=await sb.from('trocas').select('*');
  if(error)throw error;
  cache.trocas=data||[];
}
async function carregarLimpezas(){
  const {data,error}=await sb.from('limpezas').select('*');
  if(error)throw error;
  cache.limpezas=data||[];
}
async function carregarListaAtual(){
  try{
    const {data,error}=await sb.from('lista_atual').select('*').eq('id',1).maybeSingle();
    if(error)throw error;
    cache.lista=data||null;
  }catch(e){ cache.lista=null; }   // tabela opcional pode ainda não existir
}
async function carregarOverrides(){
  try{
    const {data,error}=await sb.from('override_enxoval').select('*');
    if(error)throw error;
    cache.overrides={}; (data||[]).forEach(r=>{cache.overrides[r.hotel+'||'+r.apt+'||'+String(r.dia)]=r.conta;});
  }catch(e){ cache.overrides={}; }   // tabela opcional pode ainda não existir
}
// Salva a lista do dia no banco para que todos vejam o mesmo PDF (e sobreviva ao F5)
async function salvarListaAtual(filename){
  if(!_ready)return;
  const {error}=await sb.from('lista_atual').upsert(
    {id:1, dia:_pdfDate, filename:filename||'Lista do dia', arr:_arr, dep:_dep, atualizado_em:new Date().toISOString()},
    {onConflict:'id'}
  );
  if(error)showToast('Erro ao compartilhar a lista');
}
// Aplica na tela a lista do dia salva no banco. Retorna true se havia lista.
function aplicarListaAtual(){
  const row=cache.lista;
  if(!row || !row.dia)return false;
  _arr = row.arr || {};
  _dep = row.dep || {};
  _pdfDate = row.dia;
  if(dz)dz.classList.add('loaded');
  const lbl=document.getElementById('drop-label');
  const sub=document.getElementById('drop-sub');
  if(lbl)lbl.textContent = row.filename || 'Lista do dia';
  if(sub)sub.textContent = 'Clique para trocar o arquivo';
  renderUI();
  return true;
}
function assinarTempoReal(){
  sb.channel('lavanderia-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'estoque'},       async()=>{try{await carregarEstoque();}catch(e){} rerenderCompartilhado();})
    .on('postgres_changes',{event:'*',schema:'public',table:'dias_fechados'}, async()=>{try{await carregarDias();}catch(e){}    rerenderCompartilhado();})
    .on('postgres_changes',{event:'*',schema:'public',table:'trocas'},        async()=>{try{await carregarTrocas();}catch(e){}  rerenderCompartilhado();})
    .on('postgres_changes',{event:'*',schema:'public',table:'limpezas'},      async()=>{try{await carregarLimpezas();}catch(e){}rerenderCompartilhado();})
    .on('postgres_changes',{event:'*',schema:'public',table:'lista_atual'},   async()=>{try{await carregarListaAtual();}catch(e){} aplicarListaAtual();})
    .on('postgres_changes',{event:'*',schema:'public',table:'override_enxoval'},async()=>{try{await carregarOverrides();}catch(e){} rerenderCompartilhado();})
    .subscribe();
}
function abaAtiva(){
  if(document.getElementById('tab-lavanderia').classList.contains('active'))return 'lavanderia';
  if(document.getElementById('tab-estoque').classList.contains('active'))return 'estoque';

}
function rerenderCompartilhado(){
  const aba=abaAtiva();

  else if(aba==='lavanderia') renderLavanderia();

}

function esc(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')

}

// ── LINEN CALC ───────────────────────────────────────────────────────────────
function calcLinen(config,guests,king=false,semRosto=false){
  let g=guests;
  if(g==null){if(config==='c')g=2;else if(config==='2s')g=2;else if(config==='cs')g=3;}
  g=Math.max(1,g);
  let lc=0,lk=0,ls=0,f=0,t=0,tr=(semRosto?0:1),tp=1;
  if(config==='c'){if(king){lk=2;}else{lc=2;}f=2;}
  else if(config==='2s'){const beds=g>=2?2:1;ls=beds*2;f=beds*1;}
  else if(config==='cs'){if(king){lk=2;}else{lc=2;}f=2;if(g>=2){ls=2;f+=1;}}
  t=g;return{lc,lk,ls,f,t,tr,tp};
}
function linenChips(lin){
  const p=[];
  if(lin.lc)p.push(lin.lc+'× lençol casal');
  if(lin.lk)p.push(lin.lk+'× lençol king');
  if(lin.ls)p.push(lin.ls+'× lençol solteiro');
  if(lin.f) p.push(lin.f+'× fronha');
  if(lin.t) p.push(lin.t+'× toalha banho');
  if(lin.tr)p.push(lin.tr+'× t. rosto');
  if(lin.tp)p.push(lin.tp+'× tapete');
  return p;
}

function currentMonthKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

// Agrupa linhas {hotel,apt,dia} por apartamento dentro de um mês 'YYYY-MM'
function aggPorApto(rows, month){
  const out={};
  (rows||[]).forEach(r=>{
    const dia=String(r.dia);
    if(!dia.startsWith(month))return;
    const k=r.hotel+'||'+r.apt;
    if(!out[k]) out[k]={count:0,days:[]};
    out[k].count++; out[k].days.push(dia);
  });
  Object.values(out).forEach(o=>o.days.sort());
  return out;
}
// ── REGISTRO NO BANCO ──────────────────────────────────────────────────────────
// Normaliza nome para comparar hóspedes (sem acento, minúsculo)
function normNome(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function mesmoHospede(a,b){
  const na=normNome(a), nb=normNome(b);
  if(!na||!nb)return false;
  if(na===nb)return true;
  const ta=na.split(' ').filter(x=>x.length>1), tb=nb.split(' ').filter(x=>x.length>1);
  if(ta.length<2||tb.length<2)return false;
  if(ta[0]===tb[0] && ta[ta.length-1]===tb[tb.length-1])return true;     // mesmo 1º e último nome
  const setMaior=new Set(ta.length>=tb.length?ta:tb);
  const menor=ta.length<tb.length?ta:tb;
  return menor.every(t=>setMaior.has(t));                                // um nome contém todos os tokens do outro
}
// É extensão? mesmo hóspede saindo e entrando no MESMO apto
function ehExtensao(k){
  const arr=_arr[k]||[], dep=_dep[k]||[];
  if(arr.length===0||dep.length===0)return false;
  return dep.some(d=>arr.some(a=>mesmoHospede(d.name,a.name)));
}
// Esse apto (com saída) está FORA do enxoval do dia? (extensão automática ou decisão manual)
function aptoForaDoEnxoval(k){
  if(!_dep[k]||_dep[k].length===0)return false;
  const ov=cache.overrides[k+'||'+_pdfDate];
  const conta=(ov!==undefined)?ov:!ehExtensao(k);
  return !conta;
}
// Registra TODA saída como troca (faturamento R$8,50 por rotatividade).
// O R$8,50 conta sempre — inclusive em extensão. A extensão só não gera
// enxoval físico (isso é tratado no cálculo de enxoval, não aqui).
async function registrarTrocas(dia){
  const rows=[];
  Object.keys(_dep).forEach(k=>{
    if(!_dep[k]||_dep[k].length===0)return;
    const i=k.indexOf('||');
    rows.push({hotel:k.substring(0,i),apt:k.substring(i+2),dia});
  });
  if(rows.length===0)return 0;
  const {data,error}=await sb.from('trocas')
    .upsert(rows,{onConflict:'hotel,apt,dia',ignoreDuplicates:true})
    .select();
  if(error){showToast('Erro ao salvar trocas');return 0;}
  await carregarTrocas();
  return (data||[]).length;
}
async function registrarLimpezas(depMap, dia){
  const [y,m,d]=dia.split('-').map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const DIAS_LIMPEZA=[0,2,4,6];
  if(!DIAS_LIMPEZA.includes(dow))return 0;
  const rows=[];
  Object.keys(depMap).forEach(k=>{
    if(!depMap[k]||depMap[k].length===0)return;
    const i=k.indexOf('||');
    const hotel=k.substring(0,i);
    if(hotel!=='Comf')return;
    rows.push({hotel,apt:k.substring(i+2),dia});
  });
  if(rows.length===0)return 0;
  const {data,error}=await sb.from('limpezas')
    .upsert(rows,{onConflict:'hotel,apt,dia',ignoreDuplicates:true})
    .select();
  if(error)return 0;
  await carregarLimpezas();
  return (data||[]).length;
}

function shiftMonth(month,delta){
  let[y,m]=month.split('-').map(Number);
  m+=delta;
  while(m<1){m+=12;y--;}
  while(m>12){m-=12;y++;}
  return y+'-'+String(m).padStart(2,'0');
}

}

const dz=document.getElementById('drop-zone');

async function handleFile(file){
  if(!file)return;
  document.getElementById('drop-label').textContent='Carregando...';
  document.getElementById('drop-sub').textContent=file.name;
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let items=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      tc.items.forEach(it=>{const s=it.str.trim();if(s)items.push({s,y:Math.round(it.transform[5]),x:Math.round(it.transform[4]),p});});
    }
    const map={};
    items.forEach(it=>{const k=it.p+'_'+it.y;if(!map[k])map[k]=[];map[k].push(it);});
    const lines=Object.keys(map)
      .sort((a,b)=>{const[pa,ya]=a.split('_').map(Number);const[pb,yb]=b.split('_').map(Number);return pa!==pb?pa-pb:yb-ya;})
      .map(k=>map[k].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ').replace(/\s+/g,' ').trim())
      .filter(l=>l.length>0);
    await parseAndRender(lines,file.name);
  }catch(err){
    document.getElementById('drop-label').textContent='Erro ao ler PDF';
    document.getElementById('drop-sub').textContent=err.message;
  }
}

];
const HOTEL_CLEAN_RE=new RegExp(HOTEL_TESTS.map(t=>t.r.source).join('|'),'gi');
function aptKey(raw){return raw.replace(/^0+/,'').replace(/-\d+$/,'');}
function findMatch(line){
  for(const t of HOTEL_TESTS){
    if(!t.r.test(line))continue;
    const hotelApts=ROOMS[t.h]?.apts;if(!hotelApts)continue;
    const nums=(line.match(/\b\d{2,4}(?:-\d)?\b/g)||[]);
    for(const num of nums){const key=aptKey(num);for(const apt of Object.keys(hotelApts)){if(aptKey(apt)===key)return{hotel:t.h,apt};}}
  }
  return null;
}
function extractName(line){
  const dateM=line.match(/\d{1,2}\s+[a-záéíóúàâêôãõç]+\s+\d{4}/i);
  if(dateM){
    let s=line.substring(0,line.indexOf(dateM[0]));
    s=s.replace(HOTEL_CLEAN_RE,'');
    s=s.replace(/\b\d{2,4}(?:-\d+)?\b/g,'').replace(/\s+/g,' ').trim();
    if(s.length>2)return s;
  }
  return '';
}
function extractGuests(line){
  let m=line.match(/\b([1-9])\s*(?:p(?:essoas?|x)|adu|h[oó]sp)/i);
  if(m)return parseInt(m[1]);
  const stripped=line
    .replace(/\b\d{2,4}(?:-\d)?\b/g,'')
    .replace(/\d{1,2}\s+\w{3}\s+\d{4}/g,'');
  m=stripped.match(/\b([1-9])\b/);
  return m?parseInt(m[1]):1;
}
// ── PARSE ─────────────────────────────────────────────────────────────────────
let _arr={},_dep={},_filt='all',_srch='',_detalhes=[];
function formatPdfDate(key){
  if(!key)return '';
  const[y,m,d]=key.split('-').map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${dias[dow]}, ${d} de ${meses[m-1]} de ${y}`;
}
let _pdfDate=null;
async function parseAndRender(lines,filename){
  _arr={};_dep={};let sec=null;
  lines.forEach(line=>{
    if(/chegadas/i.test(line)){sec='in';return;}
    if(/sa[íi]das/i.test(line)){sec='out';return;}
    if(!sec||/h[oó]spede.*data|acomoda[çc]|recep[çc]/i.test(line))return;
    const m=findMatch(line);if(!m)return;
    const name=extractName(line),guests=extractGuests(line),k=m.hotel+'||'+m.apt,entry={name,guests};
    if(sec==='in'){if(!_arr[k])_arr[k]=[];_arr[k].push(entry);}
    else{if(!_dep[k])_dep[k]=[];_dep[k].push(entry);}
  });
  const monthPT={'jan':'01','fev':'02','mar':'03','abr':'04','mai':'05','jun':'06','jul':'07','ago':'08','set':'09','out':'10','nov':'11','dez':'12'};
  let pdfDateKey=todayKey();
  for(const line of lines){
    const dm=line.match(/(\d{1,2})\s*([a-záéíóú]{3})\s*(\d{4})/i);
    if(dm){
      const mm=monthPT[dm[2].toLowerCase()]||'01';
      pdfDateKey=dm[3]+'-'+mm+'-'+String(dm[1]).padStart(2,'0');
      break;
    }
  }
  _pdfDate=pdfDateKey;
  if(_ready){
    const novas=await registrarTrocas(pdfDateKey);
    await registrarLimpezas(_dep,pdfDateKey);
    if(novas>0)showToast(novas+' troca'+(novas>1?'s':'')+' registrada'+(novas>1?'s':'')+' na lavanderia');
    else showToast('Dia já registrado na lavanderia');
  }else{
    showToast('Sem conexão com o banco — configure o Supabase');
  }
  dz.classList.add('loaded');
  document.getElementById('drop-label').textContent=filename;
  document.getElementById('drop-sub').textContent='Clique para trocar o arquivo';
  if(_ready) await salvarListaAtual(filename);
  renderUI();
}
// ── LINEN TOTALS ──────────────────────────────────────────────────────────────
function calcTotals(){
  const tot={lc:0,lk:0,ls:0,f:0,t:0,tr:0,tp:0};
  const detalhes=[];
  Object.keys(ROOMS).forEach(hotel=>{
    Object.keys(ROOMS[hotel].apts).forEach(apt=>{
      const k=hotel+'||'+apt,config=ROOMS[hotel].apts[apt];
      const hasIn=(_arr[k]?.length>0),hasOut=(_dep[k]?.length>0);
      if(!hasOut)return;
      if(aptoForaDoEnxoval(k))return;        // extensão ou retirado manualmente → não conta enxoval
      const guests=hasIn?(_arr[k][0]?.guests??null):null;
      const lin=calcLinen(config,guests,isKing(hotel,apt),SEM_ROSTO.has(hotel));
      const tipo=hasIn&&hasOut?'troca':hasIn?'chegada':'saída';
      const msg=tipo==='troca'?`troca (${guests}px entrando)`:`${tipo}${guests?` (${guests}px)`:' (cap. máx)'}`;
      detalhes.push({hotel,apt,config,tipo,msg,lin});
      tot.lc+=lin.lc;tot.lk+=lin.lk;tot.ls+=lin.ls;tot.f+=lin.f;tot.t+=lin.t;tot.tr+=lin.tr;tot.tp+=lin.tp;
    });
  });
  detalhes.sort((a,b)=>{
    const oa=ROOMS[a.hotel].order,ob=ROOMS[b.hotel].order;
    if(oa!==ob)return oa-ob;
    return parseInt(a.apt)-parseInt(b.apt);
  });
  return{tot,detalhes};
}

async function fecharDia(){
  if(!_pdfDate){showToast('Carregue um PDF primeiro');return;}
  if(!_ready){showToast('Sem conexão com o banco');return;}
  const {tot:lin}=calcTotals();
  const totalUsar=lin.lc+lin.lk+lin.ls+lin.f+lin.t+lin.tr+lin.tp;
  if(totalUsar===0){showToast('Nenhum item para descontar');return;}
  if(!confirm(`Fechar o dia ${_pdfDate.split('-').reverse().join('/')}?\n\nVai descontar ${totalUsar} peças do estoque.`))return;
  const {data,error}=await sb.rpc('fechar_dia',{
    p_dia:_pdfDate,p_lc:lin.lc,p_lk:lin.lk,p_ls:lin.ls,p_f:lin.f,p_t:lin.t,p_tr:lin.tr,p_tp:lin.tp
  });
  if(error){showToast('Erro ao fechar o dia');return;}
  try{await Promise.all([carregarEstoque(),carregarDias()]);}catch(e){}
  if(data===true)showToast('✓ Dia fechado · estoque atualizado');
  else showToast('Este dia já estava fechado');
  refreshEstoquePreview();
}
async function reabrirDia(){
  if(!_pdfDate||!_ready)return;

  try{await Promise.all([carregarEstoque(),carregarDias()]);}catch(e){}

// Botão: tira/recoloca o ENXOVAL FÍSICO de um apto (não mexe no R$8,50).
async function toggleEnxoval(hotel,apt){
  if(!_ready||!_pdfDate){showToast('Sem conexão com o banco');return;}
  const k=hotel+'||'+apt;
  const conta=aptoForaDoEnxoval(k);   // está fora → passa a ter enxoval; tem enxoval → tira
  const {error}=await sb.from('override_enxoval')
    .upsert({hotel,apt,dia:_pdfDate,conta},{onConflict:'hotel,apt,dia'});
  if(error){showToast('Rode o supabase-add-enxoval-override.sql para ativar este botão');return;}
  cache.overrides[k+'||'+_pdfDate]=conta;
  try{await carregarOverrides();}catch(e){}
  atualizarListaDoDia();
  showToast(conta?'Enxoval incluído (R$8,50 segue contando)':'Enxoval retirado (R$8,50 segue contando)');
}

      if(ho){
        foraEnx=aptoForaDoEnxoval(k);
        if(foraEnx){
          const ext=hi&&ehExtensao(k);

          if(_ready)chipsHtml+=`<button class="enx-toggle out" onclick="toggleEnxoval('${esc(hotel)}','${esc(apt)}')">+ Incluir no enxoval</button>`;

          const guests=hi?(iL[0]?.guests??null):null;

      sec+=`<div class="apt-card ${emp?'':'has-movement'}${foraEnx?' apt-foraenx':''}"><div class="apt-left"><span class="apt-number">${apt}</span><span class="bed-config">${cfgLabel}</span></div><div class="apt-right"><div class="badges-row">${badge}</div>${rows}${chipsHtml}</div></div>`;
    });
    if(sec)html+=`<div class="hotel-section"><div class="hotel-header">${hotel}</div>${sec}</div>`;
  });
  root.innerHTML=any?html:`<div class="empty-state">Nenhum resultado encontrado.</div>`;
}
