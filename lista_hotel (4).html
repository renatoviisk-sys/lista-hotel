<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lista do Dia</title>
<!-- ── TIPOGRAFIA: Inter (400/500/600/700) ── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — "Obsidian"
   Inspiração: Linear, Vercel, Raycast dark dashboards
   ═══════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* ── Fundos em camadas — preto puro neutro ── */
  --bg-base:  #000000;
  --bg-0:     #0a0a0a;
  --bg-1:     #111111;
  --bg-2:     #171717;
  --bg-3:     #1f1f1f;
  --bg-hover: #2a2a2a;

  /* ── Bordas ultra-finas — branco puro ── */
  --b0: rgba(255,255,255,0.05);
  --b1: rgba(255,255,255,0.08);
  --b2: rgba(255,255,255,0.12);
  --b3: rgba(255,255,255,0.20);

  /* ── Texto — neutros sem tom azul ── */
  --t1: #f5f5f5;   /* primário */
  --t2: #a0a0a0;   /* secundário */
  --t3: #5a5a5a;   /* terciário / muted */

  /* ── Indigo — ação primária (tabs, filtros ativos) ── */
  --indigo:     #818cf8;
  --indigo-dim: rgba(99,102,241,0.13);
  --indigo-bdr: rgba(99,102,241,0.28);

  /* ── Teal-green — check-in ── */
  --green:     #2dd4a0;
  --green-dim: rgba(45,212,160,0.10);
  --green-bdr: rgba(45,212,160,0.22);

  /* ── Coral — check-out ── */
  --red:     #f87171;
  --red-dim: rgba(248,113,113,0.10);
  --red-bdr: rgba(248,113,113,0.22);

  /* ── Amber — enxoval ── */
  --amber:     #fbbf24;
  --amber-dim: rgba(251,191,36,0.10);
  --amber-bdr: rgba(251,191,36,0.22);

  /* ── Violet — lavanderia ── */
  --violet:     #a78bfa;
  --violet-dim: rgba(167,139,250,0.10);
  --violet-bdr: rgba(167,139,250,0.22);

  /* ── Sage — limpeza ── */
  --sage:     #34d399;
  --sage-dim: rgba(52,211,153,0.10);
  --sage-bdr: rgba(52,211,153,0.20);

  /* ── Raios ── */
  --r-xs:   5px;
  --r-sm:   10px;
  --r-md:   14px;
  --r-lg:   18px;
  --r-xl:   24px;
  --r-pill: 9999px;

  /* ── Sombras ── */
  --sh-sm: 0 1px 3px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);
  --sh-md: 0 4px 18px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.3);
  --sh-lg: 0 16px 50px rgba(0,0,0,0.65), 0 4px 14px rgba(0,0,0,0.4);

  /* ── Fonte ── */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

/* ── Reset & base ─────────────────────────────────────────────── */
html,body{
  background: var(--bg-base);
  color: var(--t1);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbars finos (webkit) */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

#app{max-width:580px;margin:0 auto;padding:0 0 5rem;}

/* ══════════════════════════════════════════════════════════════
   TAB BAR — frosted glass, sticky
   ══════════════════════════════════════════════════════════════ */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--b1);
  margin-bottom:1.75rem;
  position:sticky;
  top:0;
  /* Glass morfismo no header */
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  z-index:20;
  padding:0 1.25rem;
}
.tab{
  flex:1;
  padding:1rem 0.5rem;
  font-size:13px;
  font-weight:500;
  color:var(--t3);
  text-align:center;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .2s, border-color .2s;
  letter-spacing:0.01em;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--t2);}
.tab.active{color:var(--t1);border-bottom-color:var(--indigo);}

.tab-content{display:none;padding:0 1.25rem;}
.tab-content.active{display:block;}

/* ══════════════════════════════════════════════════════════════
   DROP ZONE — convidativa, com brilho de fundo
   ══════════════════════════════════════════════════════════════ */
#drop-zone{
  position:relative;
  overflow:hidden;
  border:1.5px dashed var(--b2);
  border-radius:var(--r-lg);
  padding:2.75rem 2rem;
  text-align:center;
  cursor:pointer;
  background:var(--bg-1);
  transition:background .2s, border-color .2s, transform .15s;
  margin-bottom:1.75rem;
}
/* Brilho indigo sutil no topo — dá sensação de "ativo" */
#drop-zone::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,0.08) 0%,transparent 70%);
  pointer-events:none;
}
#drop-zone:hover,#drop-zone.drag{
  background:var(--bg-2);
  border-color:var(--indigo-bdr);
}
#drop-zone.drag{transform:scale(1.015);}
#drop-zone.loaded{
  border-style:solid;
  border-color:var(--b1);
}
#drop-zone.loaded::before{opacity:0;}
#file-input{display:none;}
.upload-icon{
  font-size:32px;
  margin-bottom:0.875rem;
  display:block;
  transition:transform .2s;
}
#drop-zone:hover .upload-icon{transform:translateY(-2px);}
.upload-label{
  font-size:15px;
  font-weight:600;
  color:var(--t1);
  letter-spacing:-0.01em;
}
.upload-sub{
  font-size:13px;
  color:var(--t3);
  margin-top:6px;
  line-height:1.6;
}

/* ══════════════════════════════════════════════════════════════
   SUMMARY GRID — 4 métricas
   ══════════════════════════════════════════════════════════════ */
.date-banner{
  display:flex;
  align-items:center;
  gap:0.6rem;
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:0.75rem 1rem;
  margin-bottom:1rem;
  font-size:13px;
  font-weight:500;
  color:var(--t1);
}
.date-banner-icon{font-size:15px;}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:1.75rem;
}
.metric{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1.1rem 0.75rem;
  text-align:center;
  box-shadow:var(--sh-sm);
  transition:border-color .2s, background .2s;
}
.metric:hover{background:var(--bg-2);border-color:var(--b2);}
.metric-label{
  font-size:10px;
  font-weight:600;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:0.09em;
  margin-bottom:7px;
}
.metric-value{
  font-size:26px;
  font-weight:700;
  color:var(--t1);
  letter-spacing:-0.03em;
  line-height:1;
}

/* ══════════════════════════════════════════════════════════════
   ENXOVAL PANEL
   ══════════════════════════════════════════════════════════════ */
.enxoval-section{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-lg);
  padding:1.25rem 1.5rem;
  margin-bottom:1.75rem;
  box-shadow:var(--sh-sm);
}
.enxoval-title{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t3);
  margin-bottom:1rem;
}
/* 4 colunas — 7 itens ficam em 4+3, último row com 3 itens centralizados */
.enxoval-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
/* Centraliza o último item quando ele fica sozinho (posição 4n+1 do fim) */
.enxoval-item:last-child:nth-child(4n+1){grid-column:2;}
.enxoval-item:last-child:nth-child(4n+2){grid-column:2 / span 2;max-width:unset;}
.enxoval-item{
  background:var(--bg-2);
  border:1px solid var(--b0);
  border-radius:var(--r-sm);
  padding:0.75rem 0.5rem;
  text-align:center;
  transition:border-color .2s, background .2s;
}
.enxoval-item:hover{
  background:var(--bg-3);
  border-color:var(--amber-bdr);
}
.enxoval-val{
  font-size:22px;
  font-weight:700;
  color:var(--amber);
  letter-spacing:-0.02em;
  line-height:1;
}
.enxoval-lbl{
  font-size:10px;
  font-weight:500;
  color:var(--t3);
  margin-top:5px;
  line-height:1.4;
}

/* ══════════════════════════════════════════════════════════════
   DETALHAMENTO
   ══════════════════════════════════════════════════════════════ */
.detalhamento-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-family:var(--font);
  font-weight:500;
  padding:8px 16px;
  border-radius:var(--r-pill);
  border:1px solid var(--b1);
  background:var(--bg-1);
  color:var(--t2);
  cursor:pointer;
  margin-bottom:1rem;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.detalhamento-btn:hover{
  background:var(--bg-2);
  color:var(--t1);
  border-color:var(--b2);
}
.detalhamento-btn.active{
  background:var(--indigo-dim);
  color:var(--indigo);
  border-color:var(--indigo-bdr);
}
.detalhamento-section{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1rem 1.25rem;
  margin-bottom:1.75rem;
  max-height:420px;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  box-shadow:var(--sh-sm);
}
.detalhamento-title{
  font-size:10px;
  font-weight:700;
  color:var(--t3);
  margin-bottom:0.875rem;
  text-transform:uppercase;
  letter-spacing:0.1em;
}
.detalhamento-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:10px 0;
  border-top:1px solid var(--b0);
  font-size:12px;
}
.detalhamento-item:first-of-type{border-top:none;}
.detalhamento-apt{
  min-width:62px;
  font-weight:600;
  color:var(--t1);
  font-size:12px;
}
.detalhamento-calc{
  flex:1;
  color:var(--t2);
  line-height:1.65;
}
.detalhamento-calc strong{color:var(--t1);}

/* ══════════════════════════════════════════════════════════════
   SEARCH
   ══════════════════════════════════════════════════════════════ */
#search-input{
  width:100%;
  padding:11px 16px;
  border-radius:var(--r-md);
  border:1px solid var(--b1);
  font-size:14px;
  font-family:var(--font);
  background:var(--bg-1);
  color:var(--t1);
  outline:none;
  margin-bottom:0.875rem;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
#search-input::placeholder{color:var(--t3);}
#search-input:focus{
  border-color:var(--indigo-bdr);
  box-shadow:0 0 0 3px var(--indigo-dim);
}

/* ══════════════════════════════════════════════════════════════
   FILTER ROW
   ══════════════════════════════════════════════════════════════ */
.filter-row{
  display:flex;
  gap:6px;
  margin-bottom:1.75rem;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:2px;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{
  font-size:12px;
  font-family:var(--font);
  font-weight:500;
  padding:7px 15px;
  border-radius:var(--r-pill);
  white-space:nowrap;
  border:1px solid var(--b1);
  background:var(--bg-1);
  color:var(--t2);
  cursor:pointer;
  flex-shrink:0;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn:hover{
  background:var(--bg-2);
  color:var(--t1);
  border-color:var(--b2);
}
.filter-btn.active{
  background:var(--indigo-dim);
  color:var(--indigo);
  border-color:var(--indigo-bdr);
  font-weight:600;
}

/* ══════════════════════════════════════════════════════════════
   HOTEL SECTION & APT CARDS
   ══════════════════════════════════════════════════════════════ */
.hotel-section{margin-bottom:2rem;}
.hotel-header{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--t3);
  padding:0 2px 10px;
  margin-bottom:8px;
  border-bottom:1px solid var(--b0);
}
.apt-card{
  background:var(--bg-1);
  border:1px solid var(--b0);
  border-radius:var(--r-md);
  padding:1rem 1.25rem;
  margin-bottom:8px;
  display:flex;
  align-items:stretch;
  gap:0;
  transition:border-color .2s, box-shadow .2s;
  box-shadow:var(--sh-sm);
  overflow:hidden;
}
.apt-card:hover{border-color:var(--b2);}
.apt-card.has-movement{border-color:var(--b1);}
.apt-card.has-movement:hover{
  border-color:var(--b2);
  box-shadow:var(--sh-md);
}

/* Número do apto — visual de "placa" */
.apt-left{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  min-width:56px;
  padding:0 0.875rem 0 0;
  margin-right:0.875rem;
  border-right:1px solid var(--b0);
}
.apt-number{
  font-size:18px;
  font-weight:700;
  color:var(--t1);
  line-height:1;
  letter-spacing:-0.01em;
}
.bed-config{
  font-size:9px;
  font-weight:600;
  color:var(--t3);
  text-align:center;
  line-height:1.4;
  max-width:56px;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.apt-right{flex:1;min-width:0;}
.badges-row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:8px;
}

/* ── Badges ──────────────────────────────────────── */
.type-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  font-weight:600;
  padding:4px 11px;
  border-radius:var(--r-pill);
  letter-spacing:0.01em;
  border:1px solid transparent;
}
.badge-both{background:var(--indigo-dim);color:var(--indigo);border-color:var(--indigo-bdr);}
.badge-in{background:var(--green-dim);color:var(--green);border-color:var(--green-bdr);}
.badge-out{background:var(--red-dim);color:var(--red);border-color:var(--red-bdr);}
.badge-empty{background:rgba(255,255,255,0.03);color:var(--t3);border-color:var(--b0);}

/* ── Guest rows ──────────────────────────────────── */
.guest-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-top:1px solid var(--b0);
}
.guest-row:first-of-type{border-top:none;}
.dir-dot{
  width:7px;
  height:7px;
  border-radius:50%;
  flex-shrink:0;
}
/* Glow sutil nos dots — micro-detalhe premium */
.dot-in{background:var(--green);box-shadow:0 0 7px rgba(45,212,160,0.55);}
.dot-out{background:var(--red);box-shadow:0 0 7px rgba(248,113,113,0.55);}
.guest-name{
  font-size:13px;
  font-weight:500;
  color:var(--t1);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.guest-meta{
  font-size:11px;
  font-weight:500;
  color:var(--t3);
  white-space:nowrap;
}
.no-movement{font-size:12px;color:var(--t3);font-style:italic;}

/* ── Linen chips ─────────────────────────────────── */
.enxoval-chips{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:9px;
  padding-top:9px;
  border-top:1px solid var(--b0);
}
.chip{
  font-size:10px;
  font-weight:600;
  padding:3px 9px;
  border-radius:var(--r-pill);
  background:var(--amber-dim);
  color:var(--amber);
  border:1px solid var(--amber-bdr);
  white-space:nowrap;
  letter-spacing:0.01em;
}

#results{display:none;}
.empty-state{
  text-align:center;
  padding:4rem 2rem;
  color:var(--t3);
  font-size:14px;
  line-height:1.75;
}

/* ══════════════════════════════════════════════════════════════
   LAVANDERIA TAB
   ══════════════════════════════════════════════════════════════ */
.lav-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:1.75rem;
}
.lav-month{
  font-size:17px;
  font-weight:700;
  color:var(--t1);
  letter-spacing:-0.02em;
}
.lav-sub{
  font-size:12px;
  color:var(--t3);
  margin-top:3px;
  font-weight:400;
}
.btn-reset{
  font-size:12px;
  font-family:var(--font);
  font-weight:600;
  padding:7px 16px;
  border-radius:var(--r-pill);
  border:1px solid var(--red-bdr);
  background:var(--red-dim);
  color:var(--red);
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-reset:hover{background:rgba(248,113,113,0.17);border-color:rgba(248,113,113,0.32);}
.btn-reset:active{opacity:.75;}

.lav-total-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:1.75rem;
}
/* Modifier para margem menor (limpeza section) */
.lav-total-grid--sm{margin-bottom:1rem !important;}

.lav-total-card{
  background:var(--bg-1);
  border:1px solid var(--b1);
  border-radius:var(--r-md);
  padding:1.1rem 1.25rem;
  text-align:center;
  box-shadow:var(--sh-sm);
}
.lav-total-val{
  font-size:28px;
  font-weight:700;
  color:var(--violet);
  letter-spacing:-0.03em;
  line-height:1;
}
.lav-total-lbl{
  font-size:11px;
  font-weight:500;
  color:var(--t3);
  margin-top:7px;
  letter-spacing:0.02em;
}
.lav-total-sub{
  font-size:10px;
  color:var(--t3);
  margin-top:3px;
  opacity:.6;
}
/* Usa a cor sage para valores financeiros positivos */
.lav-green{color:var(--sage) !important;}

.lav-apt-card{
  background:var(--bg-1);
  border:1px solid var(--b0);
  border-radius:var(--r-md);
  padding:0.9rem 1.25rem;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:var(--sh-sm);
  transition:border-color .2s;
}
.lav-apt-card:hover{border-color:var(--b2);}
.lav-apt-left{
  min-width:52px;
  text-align:center;
  padding-right:0.875rem;
  border-right:1px solid var(--b0);
}
.lav-apt-num{
  font-size:16px;
  font-weight:700;
  color:var(--t1);
  letter-spacing:-0.01em;
}
.lav-apt-hotel{
  font-size:9px;
  font-weight:600;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-top:3px;
}
.lav-apt-right{flex:1;}

/* Layout interno do card de lavanderia (substitui inline style) */
.lav-apt-info{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:8px;
}
.lav-apt-count{
  font-size:26px;
  font-weight:700;
  color:var(--violet);
  text-align:right;
  letter-spacing:-0.03em;
  line-height:1;
  white-space:nowrap;
}
.lav-apt-label{
  font-size:10px;
  font-weight:600;
  color:var(--t3);
  text-align:right;
  margin-top:3px;
  text-transform:uppercase;

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── ROOMS ────────────────────────────────────────────────────────────────────
const ROOMS={
  "Comf":{order:1,apts:{"109":"2s","202":"cs","207":"cs","811":"c","1014":"cs","1102":"c","1111":"c","1301":"cs"}},
  "Lets":{order:2,apts:{"506":"c","913":"2s","1301":"c","1407":"c"}},
  "Kubit":{order:3,apts:{"113":"c","117":"c"}},
  "Bona":{order:4,apts:{"618":"c","702":"c"}},
  "Saint":{order:5,apts:{"411":"cs","815":"c","1215":"c"}},
  "Ramada":{order:6,apts:{"1214":"2s"}},
  "Tryp":{order:7,apts:{"06":"c","105":"c","207":"c"}},
  "Comft":{order:8,apts:{"106":"c","109":"cs","111":"2s","114":"c","206":"c","305":"cs","310":"c","311":"2s","316":"c","407":"2s","607":"2s","614":"c","705":"c","710":"c","803":"c","809":"c","810":"cs","1007":"cs"}},
  "Go Inn":{order:9,apts:{"101":"c","114":"c","117":"2s","119":"c","207":"2s","210":"2s","305":"cs","310":"2s","313":"2s","408":"2s","411":"c","413":"cs","418":"c","503":"c","506":"c","509":"c","515":"2s","516":"c","517":"c","519":"c","603":"c","605":"cs","609":"cs","610":"2s","611":"c","617":"c","705":"c","708":"c","715":"c","806":"c","815":"c","906":"c","909":"c","913":"2s","914":"c"}}
};
const CFG_LABEL={"c":"casal","2s":"2 solteiro","cs":"casal + solteiro"};
const KING_APTS=new Set(["Tryp||06","Tryp||105","Tryp||207","Lets||1301","Lets||506","Comft||705","Comft||206"]);

const PRECO={
  adminPorApto: 230,
  trocaEnxoval: 8.5,
  limpezaComf:  25,
};

function esc(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function isKing(hotel,apt){return KING_APTS.has(hotel+'||'+apt);}

// ── LINEN CALC ───────────────────────────────────────────────────────────────
function calcLinen(config,guests,king=false){
  let g=guests;
  if(g==null){if(config==='c')g=2;else if(config==='2s')g=2;else if(config==='cs')g=3;}
  g=Math.max(1,g);
  let lc=0,lk=0,ls=0,f=0,t=0,tr=1,tp=1;
  if(config==='c'){if(king){lk=2;}else{lc=2;}f=2;}
  else if(config==='2s'){const beds=g>=2?2:1;ls=beds*2;f=beds*1;}
  else if(config==='cs'){if(king){lk=2;}else{lc=2;}f=2;if(g>=2){ls=2;f+=1;}}
  t=g;return{lc,lk,ls,f,t,tr,tp};
}
function linenChips(lin){
  const p=[];
  if(lin.lc)p.push(lin.lc+'× lençol casal');
  if(lin.lk)p.push(lin.lk+'× lençol king');
  if(lin.ls)p.push(lin.ls+'× lençol solteiro');
  if(lin.f) p.push(lin.f+'× fronha');
  if(lin.t) p.push(lin.t+'× toalha banho');
  if(lin.tr)p.push(lin.tr+'× t. rosto');
  if(lin.tp)p.push(lin.tp+'× tapete');
  return p;
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='lavanderia') renderLavanderia();
  if(name==='estoque') renderEstoque();
}

// ── LAVANDERIA STORAGE ────────────────────────────────────────────────────────
function purgeOldMonths(data,keepMonths=12){
  const keys=Object.keys(data).sort();
  while(keys.length>keepMonths)delete data[keys.shift()];
  return data;
}
function getLavData(){
  try{return JSON.parse(localStorage.getItem('lav_data')||'{}');}catch{return {};}
}
function saveLavData(data){
  try{localStorage.setItem('lav_data',JSON.stringify(purgeOldMonths(data)));}
  catch(e){if(e.name==='QuotaExceededError')showToast('⚠️ Armazenamento cheio — dados não salvos');}
}
function getLimpezaData(){
  try{return JSON.parse(localStorage.getItem('limp_data')||'{}');}catch{return {};}
}
function saveLimpezaData(data){
  try{localStorage.setItem('limp_data',JSON.stringify(purgeOldMonths(data)));}
  catch(e){if(e.name==='QuotaExceededError')showToast('⚠️ Armazenamento cheio — dados não salvos');}
}

function registerLimpeza(depMap,dateKey){
  const dayKey=dateKey||todayKey();
  const month=dayKey.substring(0,7);
  const [y,m,d]=dayKey.split('-').map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const DIAS_LIMPEZA=[0,2,4,6];
  if(!DIAS_LIMPEZA.includes(dow))return 0;
  const data=getLimpezaData();
  if(!data[month])data[month]={};
  let newCount=0;
  Object.keys(depMap).forEach(k=>{
    if(!depMap[k]||depMap[k].length===0)return;
    const[hotel]=k.split('||');
    if(hotel!=='Comf')return;
    if(!data[month][k])data[month][k]={count:0,days:[]};
    if(data[month][k].days.includes(dayKey))return;
    data[month][k].count+=1;
    data[month][k].days.push(dayKey);
    newCount++;
  });
  saveLimpezaData(data);
  return newCount;
}

function currentMonthKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function registerCheckouts(depMap,dateKey){
  const dayKey=dateKey||todayKey();
  const month=dayKey.substring(0,7);
  const data=getLavData();
  if(!data[month])data[month]={};
  let newCount=0;
  Object.keys(depMap).forEach(k=>{
    if(!depMap[k]||depMap[k].length===0)return;
    if(!data[month][k])data[month][k]={count:0,days:[]};
    if(data[month][k].days.includes(dayKey))return;
    data[month][k].count+=1;
    data[month][k].days.push(dayKey);
    newCount++;
  });
  saveLavData(data);
  return newCount;
}

function renderLavanderia(){
  const month=currentMonthKey();
  const data=getLavData();
  const monthData=data[month]||{};
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const[y,m]=month.split('-');
  const monthLabel=monthNames[parseInt(m)-1]+' '+y;
  const entries=Object.keys(monthData)
    .filter(k=>monthData[k].count>0)
    .map(k=>{const[hotel,apt]=k.split('||');return{key:k,hotel,apt,count:monthData[k].count,days:monthData[k].days};})
    .sort((a,b)=>{
      const oa=ROOMS[a.hotel]?.order??99,ob=ROOMS[b.hotel]?.order??99;
      if(oa!==ob)return oa-ob;
      return parseInt(a.apt)-parseInt(b.apt);
    });
  const totalTrocas=entries.reduce((s,e)=>s+e.count,0);
  const totalAptos=entries.length;
  const totalCadastrados=Object.values(ROOMS).reduce((s,h)=>s+Object.keys(h.apts).length,0);
  const fmtBRL=v=>v.toLocaleString('pt-BR',{minimumFractionDigits:2});
  let html=`
  <div class="lav-header">
    <div>
      <div class="lav-month">${monthLabel}</div>
      <div class="lav-sub">Histórico de trocas de enxoval</div>
    </div>
    <button class="btn-reset" onclick="openDialog()">Zerar mês</button>
  </div>
  <div class="lav-total-grid">
    <div class="lav-total-card"><div class="lav-total-val">${totalTrocas}</div><div class="lav-total-lbl">Trocas no mês</div></div>
    <div class="lav-total-card"><div class="lav-total-val">${totalAptos}</div><div class="lav-total-lbl">Aptos atendidos</div></div>
    <div class="lav-total-card"><div class="lav-total-val lav-green">R$ ${fmtBRL(totalCadastrados*PRECO.adminPorApto)}</div><div class="lav-total-lbl">Administração</div><div class="lav-total-sub">R$ ${fmtBRL(PRECO.adminPorApto)} × ${totalCadastrados} aptos</div></div>
    <div class="lav-total-card"><div class="lav-total-val lav-green">R$ ${fmtBRL(totalTrocas*PRECO.trocaEnxoval)}</div><div class="lav-total-lbl">Troca de roupa</div><div class="lav-total-sub">R$ ${fmtBRL(PRECO.trocaEnxoval)} por troca</div></div>
  </div>`;
  if(entries.length===0){
    html+=`<div class="lav-empty"><div class="lav-empty-icon">🧺</div>Nenhuma troca registrada este mês.<br>Carregue um PDF na aba Lista do Dia.</div>`;
  }else{
    const hotels=[...new Set(entries.map(e=>e.hotel))];
    hotels.forEach(hotel=>{
      const hotelEntries=entries.filter(e=>e.hotel===hotel);
      html+=`<div class="hotel-section"><div class="hotel-header">${esc(hotel)}</div>`;
      hotelEntries.forEach(e=>{
        const dayChips=e.days.map(d=>{const[,mm,dd]=d.split('-');return`<span class="lav-day-chip">${dd}/${mm}</span>`;}).join('');
        html+=`<div class="lav-apt-card">
          <div class="lav-apt-left">
            <div class="lav-apt-num">${esc(e.apt)}</div>
            <div class="lav-apt-hotel">${CFG_LABEL[ROOMS[e.hotel]?.apts[e.apt]]||''}</div>
          </div>
          <div class="lav-apt-right">
            <div class="lav-apt-info">
              <div class="lav-history">${dayChips}</div>
              <div><div class="lav-apt-count">${e.count}×</div><div class="lav-apt-label">trocas</div></div>
            </div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  // ── LIMPEZA PRÓPRIA COMF ──
  const limpData=getLimpezaData();
  const limpMonthData=limpData[month]||{};
  const limpEntries=Object.keys(limpMonthData)
    .filter(k=>limpMonthData[k].count>0)
    .map(k=>{const[hotel,apt]=k.split('||');return{key:k,hotel,apt,count:limpMonthData[k].count,days:limpMonthData[k].days};})
    .sort((a,b)=>parseInt(a.apt)-parseInt(b.apt));
  const totalLimpezas=limpEntries.reduce((s,e)=>s+e.count,0);
  if(limpEntries.length>0){
    html+=`<div class="limpeza-section">
      <div class="limpeza-title">🧹 Limpeza própria — Comf<span class="limpeza-tag">R$ ${fmtBRL(totalLimpezas*PRECO.limpezaComf)}</span></div>
      <div class="lav-total-grid lav-total-grid--sm">
        <div class="lav-total-card"><div class="lav-total-val lav-green">${totalLimpezas}</div><div class="lav-total-lbl">Limpezas no mês</div></div>
        <div class="lav-total-card"><div class="lav-total-val lav-green">R$ ${fmtBRL(totalLimpezas*PRECO.limpezaComf)}</div><div class="lav-total-lbl">Valor total</div><div class="lav-total-sub">R$ ${fmtBRL(PRECO.limpezaComf)} por limpeza</div></div>
      </div>`;
    limpEntries.forEach(e=>{
      const dayChips=e.days.map(d=>{const[,mm,dd]=d.split('-');return`<span class="lav-day-chip">${dd}/${mm}</span>`;}).join('');
      html+=`<div class="limpeza-apt-row">

// ── ESTOQUE ────────────────────────────────────────────────────────────────────
// Structure: { lc:N, lk:N, ls:N, f:N, t:N, tr:N, tp:N }
// Also tracks days already deducted: { last_deducted: ["YYYY-MM-DD",...] }
const ESTOQUE_ITEMS=[
  {key:'lc',name:'Lençol casal'},
  {key:'lk',name:'Lençol king'},
  {key:'ls',name:'Lençol solteiro'},
  {key:'f',name:'Fronha'},
  {key:'t',name:'Toalha banho'},
  {key:'tr',name:'Toalha rosto'},
  {key:'tp',name:'Tapete'},
];

function getEstoque(){
  try{const d=JSON.parse(localStorage.getItem('estoque')||'{}');
    ESTOQUE_ITEMS.forEach(i=>{if(typeof d[i.key]!=='number')d[i.key]=0;});
    if(!Array.isArray(d.last_deducted))d.last_deducted=[];
    return d;
  }catch{return{lc:0,lk:0,ls:0,f:0,t:0,tr:0,tp:0,last_deducted:[]};}
}
function saveEstoque(d){localStorage.setItem('estoque',JSON.stringify(d));}

function adjustEstoque(key,delta){
  const d=getEstoque();
  d[key]=Math.max(0,(d[key]||0)+delta);
  saveEstoque(d);
  renderEstoque();
}

// Deduct linen used today from estoque. Only deducts once per date.
function deductFromEstoque(dateKey){
  const d=getEstoque();
  if(d.last_deducted.includes(dateKey))return false;
  const lin=calcTotals();
  d.lc=Math.max(0,d.lc-lin.lc);
  d.lk=Math.max(0,d.lk-lin.lk);
  d.ls=Math.max(0,d.ls-lin.ls);
  d.f=Math.max(0,d.f-lin.f);
  d.t=Math.max(0,d.t-lin.t);
  d.tr=Math.max(0,d.tr-lin.tr);
  d.tp=Math.max(0,d.tp-lin.tp);
  d.last_deducted.push(dateKey);
  saveEstoque(d);
  return true;
}

async function handleFile(file){
  if(!file)return;
  document.getElementById('drop-label').textContent='Carregando...';
  document.getElementById('drop-sub').textContent=file.name;
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let items=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      tc.items.forEach(it=>{const s=it.str.trim();if(s)items.push({s,y:Math.round(it.transform[5]),x:Math.round(it.transform[4]),p});});
    }
    const map={};
    items.forEach(it=>{const k=it.p+'_'+it.y;if(!map[k])map[k]=[];map[k].push(it);});
    const lines=Object.keys(map)
      .sort((a,b)=>{const[pa,ya]=a.split('_').map(Number);const[pb,yb]=b.split('_').map(Number);return pa!==pb?pa-pb:yb-ya;})
      .map(k=>map[k].sort((a,b)=>a.x-b.x).map(i=>i.s).join(' ').replace(/\s+/g,' ').trim())
      .filter(l=>l.length>0);
    parseAndRender(lines,file.name);
  }catch(err){
    document.getElementById('drop-label').textContent='Erro ao ler PDF';
    document.getElementById('drop-sub').textContent=err.message;
  }
}

// ── HOTEL DETECTOR ────────────────────────────────────────────────────────────
const HOTEL_TESTS=[
  {r:/go\s*inn?/i,h:'Go Inn'},{r:/comf\s*t\b|comft\b/i,h:'Comft'},{r:/\bcomf\b/i,h:'Comf'},
  {r:/\blets\b/i,h:'Lets'},{r:/\bkubit\b/i,h:'Kubit'},{r:/\bbona\b/i,h:'Bona'},
  {r:/\bsaint\b/i,h:'Saint'},{r:/\bramada\b/i,h:'Ramada'},{r:/\btryp\b/i,h:'Tryp'},
];
const HOTEL_CLEAN_RE=new RegExp(HOTEL_TESTS.map(t=>t.r.source).join('|'),'gi');

function aptKey(raw){return raw.replace(/^0+/,'').replace(/-\d+$/,'');}
function findMatch(line){
  for(const t of HOTEL_TESTS){
    if(!t.r.test(line))continue;
    const hotelApts=ROOMS[t.h]?.apts;if(!hotelApts)continue;
    const nums=(line.match(/\b\d{2,4}(?:-\d)?\b/g)||[]);
    for(const num of nums){const key=aptKey(num);for(const apt of Object.keys(hotelApts)){if(aptKey(apt)===key)return{hotel:t.h,apt};}}
  }
  return null;
}
function extractName(line){
  const dateM=line.match(/\d{1,2}\s+[a-záéíóúàâêôãõç]+\s+\d{4}/i);
  if(dateM){
    let s=line.substring(0,line.indexOf(dateM[0]));
    s=s.replace(HOTEL_CLEAN_RE,'');
    s=s.replace(/\b\d{2,4}(?:-\d+)?\b/g,'').replace(/\s+/g,' ').trim();
    if(s.length>2)return s;
  }
  return '';
}
function extractGuests(line){
  let m=line.match(/\b([1-9])\s*(?:p(?:essoas?|x)|adu|h[oó]sp)/i);
  if(m)return parseInt(m[1]);
  const stripped=line
    .replace(/\b\d{2,4}(?:-\d)?\b/g,'')
    .replace(/\d{1,2}\s+\w{3}\s+\d{4}/g,'');
  m=stripped.match(/\b([1-9])\b/);
  return m?parseInt(m[1]):1;
}

// ── PARSE ─────────────────────────────────────────────────────────────────────
let _arr={},_dep={},_filt='all',_srch='',_detalhes=[];

function formatPdfDate(key){
  if(!key)return '';
  const[y,m,d]=key.split('-').map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${dias[dow]}, ${d} de ${meses[m-1]} de ${y}`;
}
let _pdfDate=null;
function parseAndRender(lines,filename){
  _arr={};_dep={};let sec=null;
  lines.forEach(line=>{
    if(/chegadas/i.test(line)){sec='in';return;}
    if(/sa[íi]das/i.test(line)){sec='out';return;}
    if(!sec||/h[oó]spede.*data|acomoda[çc]|recep[çc]/i.test(line))return;
    const m=findMatch(line);if(!m)return;
    const name=extractName(line),guests=extractGuests(line),k=m.hotel+'||'+m.apt,entry={name,guests};
    if(sec==='in'){if(!_arr[k])_arr[k]=[];_arr[k].push(entry);}
    else{if(!_dep[k])_dep[k]=[];_dep[k].push(entry);}
  });
  const monthPT={'jan':'01','fev':'02','mar':'03','abr':'04','mai':'05','jun':'06','jul':'07','ago':'08','set':'09','out':'10','nov':'11','dez':'12'};
  let pdfDateKey=todayKey();
  for(const line of lines){
    const dm=line.match(/(\d{1,2})\s*([a-záéíóú]{3})\s*(\d{4})/i);
    if(dm){
      const mm=monthPT[dm[2].toLowerCase()]||'01';
      pdfDateKey=dm[3]+'-'+mm+'-'+String(dm[1]).padStart(2,'0');
      break;
    }
  }
  _pdfDate=pdfDateKey;
  const newCount=registerCheckouts(_dep,pdfDateKey);
  registerLimpeza(_dep,pdfDateKey);
  if(newCount>0)showToast(newCount+' troca'+(newCount>1?'s':'')+' registrada'+(newCount>1?'s':'')+' na lavanderia');
  else showToast('Dia já registrado na lavanderia');
  dz.classList.add('loaded');
  document.getElementById('drop-label').textContent=filename;
  document.getElementById('drop-sub').textContent='Clique para trocar o arquivo';
  renderUI();
}

// ── LINEN TOTALS ──────────────────────────────────────────────────────────────
function calcTotals(){
  const tot={lc:0,lk:0,ls:0,f:0,t:0,tr:0,tp:0};
  const detalhes=[];
  Object.keys(ROOMS).forEach(hotel=>{
    Object.keys(ROOMS[hotel].apts).forEach(apt=>{
      const k=hotel+'||'+apt,config=ROOMS[hotel].apts[apt];
      const hasIn=(_arr[k]?.length>0),hasOut=(_dep[k]?.length>0);
      if(!hasOut)return;
      const guests=hasIn?(_arr[k][0]?.guests??null):null;
      const lin=calcLinen(config,guests,isKing(hotel,apt));
      const tipo=hasIn&&hasOut?'troca':hasIn?'chegada':'saída';
      const msg=tipo==='troca'?`troca (${guests}px entrando)`:`${tipo}${guests?` (${guests}px)`:' (cap. máx)'}`;
      detalhes.push({hotel,apt,config,tipo,msg,lin});
      tot.lc+=lin.lc;tot.lk+=lin.lk;tot.ls+=lin.ls;tot.f+=lin.f;tot.t+=lin.t;tot.tr+=lin.tr;tot.tp+=lin.tp;
    });
  });
  detalhes.sort((a,b)=>{
    const oa=ROOMS[a.hotel].order,ob=ROOMS[b.hotel].order;
    if(oa!==ob)return oa-ob;
    return parseInt(a.apt)-parseInt(b.apt);
  });
  return{tot,detalhes};
}

function fecharDia(){
  if(!_pdfDate){showToast('Carregue um PDF primeiro');return;}
  // Confirm before deducting
  const lin=calcTotals();
  const totalUsar=lin.lc+lin.lk+lin.ls+lin.f+lin.t+lin.tr+lin.tp;
  if(totalUsar===0){showToast('Nenhum item para descontar');return;}
  if(!confirm(`Fechar o dia ${_pdfDate.split('-').reverse().join('/')}?\n\nVai descontar ${totalUsar} peças do estoque.`))return;
  const ok=deductFromEstoque(_pdfDate);
  if(ok){
    showToast('✓ Dia fechado · estoque atualizado');
    renderUI();
  }else{
    showToast('Este dia já foi fechado');
  }
}

function reabrirDia(){
  if(!_pdfDate)return;
  const d=getEstoque();
  if(!d.last_deducted.includes(_pdfDate))return;
  // Restore stock: add back what was deducted
  const lin=calcTotals();
  d.lc+=lin.lc;d.lk+=lin.lk;d.ls+=lin.ls;d.f+=lin.f;d.t+=lin.t;d.tr+=lin.tr;d.tp+=lin.tp;
  d.last_deducted=d.last_deducted.filter(x=>x!==_pdfDate);
  saveEstoque(d);
  showToast('Dia reaberto · estoque restaurado');
  renderUI();
}

      const hi=iL.length>0,ho=oL.length>0,emp=!hi&&!ho,both=hi&&ho;
      if(_filt==='both'&&!both)return;
      if(_filt==='in'&&(!hi||both))return;
      if(_filt==='out'&&(!ho||both))return;
      if(_filt==='empty'&&!emp)return;
      if(_srch){const s=(hotel+' '+apt).toLowerCase(),n=[...iL,...oL].map(x=>x.name.toLowerCase()).join(' ');if(!s.includes(_srch)&&!n.includes(_srch))return;}
      any=true;
      const config=ROOMS[hotel].apts[apt],cfgLabel=CFG_LABEL[config]||config;
      const badge=emp?`<span class="type-badge badge-empty">Sem movimento</span>`:both?`<span class="type-badge badge-both">⇄ Troca</span>`:hi?`<span class="type-badge badge-in">↓ Chegada</span>`:`<span class="type-badge badge-out">↑ Saída</span>`;
      let rows='';
      oL.forEach(g=>{rows+=`<div class="guest-row"><div class="dir-dot dot-out"></div><span class="guest-name">${esc(g.name)||'–'}</span><span class="guest-meta">${g.guests} px · 12:00</span></div>`;});
      iL.forEach(g=>{rows+=`<div class="guest-row"><div class="dir-dot dot-in"></div><span class="guest-name">${esc(g.name)||'–'}</span><span class="guest-meta">${g.guests} px · 15:00</span></div>`;});
      if(emp)rows=`<div class="no-movement">sem movimentação hoje</div>`;
      let chipsHtml='';
      if(ho){const guests=hi?(iL[0]?.guests??null):null;const lin=calcLinen(config,guests,isKing(hotel,apt));const chips=linenChips(lin);chipsHtml=`<div class="enxoval-chips">${chips.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>`;}
      sec+=`<div class="apt-card ${emp?'':'has-movement'}"><div class="apt-left"><span class="apt-number">${apt}</span><span class="bed-config">${cfgLabel}</span></div><div class="apt-right"><div class="badges-row">${badge}</div>${rows}${chipsHtml}</div></div>`;
    });
    if(sec)html+=`<div class="hotel-section"><div class="hotel-header">${hotel}</div>${sec}</div>`;
  });
  root.innerHTML=any?html:`<div class="empty-state">Nenhum resultado encontrado.</div>`;
}
</script>
</body>
</html>
